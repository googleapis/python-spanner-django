[flake8]
max-line-length = 79
ignore =
  E501
  W503
  W504
  E203
exclude =
  # Exclude generated code.
  **/_build/**

  # Standard linting exemptions.
  __pycache__,
  .git,
  *.pyc,
  conf.py

[isort]
use_parentheses = True
combine_as_imports = True
default_section = THIRDPARTY
include_trailing_comma = True
force_grid_wrap = 0
line_length = 79
multi_line_output = 3
ensure_newline_before_comments = True
